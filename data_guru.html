<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Guru - Sistem Informasi Sekolah</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #4f46e5;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-color: #1f2937;
            --text-muted: #6b7280;
            --nav-bg: #ffffff;
            --nav-border: rgba(0,0,0,0.1);
            --table-border: #e5e7eb;
        }

        body.dark {
            --bg-color: #111827;
            --card-bg: #1f2937;
            --text-color: #f3f4f6;
            --text-muted: #9ca3af;
            --nav-bg: #1f2937;
            --nav-border: rgba(255,255,255,0.1);
            --table-border: #374151;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); overflow-x: hidden; }
        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }

        nav {
            background-color: var(--nav-bg);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--nav-border);
            position: sticky; top: 0; z-index: 100;
        }

        .logo { font-weight: 600; font-size: 1.2rem; color: var(--primary-color); }
        .wrapper { display: flex; min-height: calc(100vh - 73px); }
        
        .main-sidebar {
            width: 250px; background-color: var(--nav-bg); border-right: 1px solid var(--nav-border);
            padding: 15px 0; transition: all 0.3s ease; overflow-x: hidden; white-space: nowrap;
        }
        .wrapper.collapsed .main-sidebar { width: 0; border-right: none; }

        .nav-sidebar { list-style: none; }
        .nav-item a { padding: 12px 25px; display: flex; align-items: center; color: var(--text-color); text-decoration: none; font-size: 0.9rem; }
        .nav-item i { width: 30px; font-size: 1.1rem; color: var(--primary-color); }
        .nav-item a:hover, .nav-item.active a { background: rgba(79, 70, 229, 0.1); border-left: 4px solid var(--primary-color); padding-left: 21px; }

        .sidebar-toggle-btn { background: none; border: none; color: var(--text-color); font-size: 1.2rem; cursor: pointer; margin-right: 15px; }
        .content { flex: 1; padding: 30px; }

        .card { background: var(--card-bg); padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn-add { background-color: var(--primary-color); color: white; padding: 8px 16px; border-radius: 6px; text-decoration: none; font-size: 0.85rem; border: none; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; }
        .btn-add:hover { opacity: 0.9; }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }
        .modal-content {
            background: var(--card-bg);
            width: 90%;
            max-width: 650px;
            max-height: 90vh;
            border-radius: 12px;
            padding: 30px;
            position: relative;
            overflow-y: auto;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid var(--nav-border); padding-bottom: 15px; }
        .close-modal { background: none; border: none; font-size: 1.5rem; color: var(--text-muted); cursor: pointer; }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .form-group-full { grid-column: span 2; }
        .form-group label, .form-group-full label { display: block; font-size: 0.8rem; font-weight: 600; margin-bottom: 5px; color: var(--text-color); }
        .form-group input, .form-group-full input, .form-group-full textarea {
            width: 100%; padding: 10px; border: 1px solid var(--table-border); border-radius: 6px;
            background: var(--bg-color); color: var(--text-color); font-size: 0.9rem; outline: none;
        }
        .form-group input:focus, .form-group-full input:focus, .form-group-full textarea:focus { border-color: var(--primary-color); }
        .form-group-full textarea { resize: vertical; min-height: 80px; }

        /* Style for readonly/disabled input */
        input[readonly] {
            background-color: var(--bg-color); /* Use a lighter background */
            color: var(--text-muted); /* Muted text color */
            cursor: not-allowed; /* Indicate it's not editable */
        }

        #foto-preview {
            max-width: 150px;
            margin-top: 10px;
            border-radius: 8px;
            border: 1px solid var(--table-border);
            display: none;
        }

        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr; }
            .form-group-full { grid-column: span 1; }
        }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid var(--table-border); }
        th { font-weight: 600; color: var(--text-muted); font-size: 0.85rem; }
        tr:hover { background-color: rgba(79, 70, 229, 0.02); }

        .badge { padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: 600; }
        .badge-success { background: #dcfce7; color: #166534; }
        .badge-primary { background: #e0e7ff; color: #3730a3; }

        .theme-toggle-nav { background: none; border: 1px solid var(--nav-border); padding: 5px 10px; border-radius: 6px; cursor: pointer; color: var(--text-color); margin-right: 15px; }
        .btn-logout { padding: 8px 16px; background-color: #ef4444; color: white; text-decoration: none; border-radius: 6px; font-size: 0.9rem; }

        @media (max-width: 768px) {
            .main-sidebar { width: 0; border-right: none; }
            .wrapper.sidebar-open .main-sidebar { width: 250px; border-right: 1px solid var(--nav-border); }
        }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    <nav>
        <div style="display: flex; align-items: center;">
            <button id="sidebar-toggle" class="sidebar-toggle-btn"><i class="fas fa-bars"></i></button>
            <div class="logo">SekolahKu</div>
        </div>
        <div style="display: flex; align-items: center;">
            <button class="theme-toggle-nav" id="theme-toggle">🌙</button>
            <a href="index.html" class="btn-logout">Keluar</a>
        </div>
    </nav>
    <div class="wrapper">
        <aside class="main-sidebar">
            <ul class="nav-sidebar">
                <li class="nav-item"><a href="dashboard.html" id="link-dashboard"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                <li class="nav-item"><a href="#"><i class="fas fa-user-graduate"></i> Data Siswa</a></li>
                <li class="nav-item active"><a href="data_guru.html" id="link-guru"><i class="fas fa-chalkboard-teacher"></i> Data Guru</a></li>
                <li class="nav-item"><a href="#"><i class="fas fa-calendar-check"></i> Absensi</a></li>
                <li class="nav-item"><a href="#"><i class="fas fa-file-invoice"></i> Laporan</a></li>
                <li class="nav-item"><a href="#"><i class="fas fa-cog"></i> Pengaturan</a></li>
            </ul>
        </aside>
        <main class="content">
            <div class="card">
                <div class="card-header">
                    <h2>Daftar Data Guru</h2>
                    <button id="btn-tambah-guru" class="btn-add"><i class="fas fa-plus"></i> Tambah Guru</button>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>NIP</th>
                            <th>Nama Lengkap</th>
                            <th>Mata Pelajaran</th>
                            <th>Status</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>198501012010011001</td>
                            <td>Budi Santoso, M.Pd.</td>
                            <td><span class="badge badge-primary">Matematika</span></td>
                            <td><span class="badge badge-success">Aktif</span></td>
                            <td><a href="#" style="color: var(--primary-color);"><i class="fas fa-edit"></i></a></td>
                        </tr>
                        <tr>
                            <td>199005122015022003</td>
                            <td>Siti Aminah, S.Kom.</td>
                            <td><span class="badge badge-primary">Informatika</span></td>
                            <td><span class="badge badge-success">Aktif</span></td>
                            <td><a href="#" style="color: var(--primary-color);"><i class="fas fa-edit"></i></a></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Modal Tambah Guru -->
    <div class="modal-overlay" id="modal-guru">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Tambah Data Guru</h3>
                <button class="close-modal" id="close-modal-btn">&times;</button>
            </div>
            <form id="form-guru">
                <div class="form-grid">
                    <div class="form-group">
                        <label>ID Guru</label>
                        <input type="text" id="id_guru" name="id_guru" placeholder="Otomatis" readonly required>
                    </div>
                    <div class="form-group">
                        <label>Nama Lengkap</label>
                        <input type="text" name="nama_guru" placeholder="Masukkan nama" required>
                    </div>
                    <div class="form-group">
                        <label>NIP</label>
                        <input type="text" name="nip_guru" placeholder="Masukkan NIP" required>
                    </div>
                    <div class="form-group">
                        <label>Tempat Lahir</label>
                        <input type="text" name="tempat_lahir" placeholder="Kota lahir" required>
                    </div>
                    <div class="form-group">
                        <label>Tanggal Lahir</label>
                        <input type="date" name="tgl_lahir" required>
                    </div>
                    <div class="form-group">
                        <label>Nomor HP</label>
                        <input type="tel" name="no_hp_guru" placeholder="08xxxxxxxxxx" required>
                    </div>
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" name="username_guru" placeholder="Untuk login" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" name="pass_guru" placeholder="********" required>
                    </div>
                    <div class="form-group-full">
                        <label>Alamat</label>
                        <textarea name="alamat_guru" rows="3" placeholder="Alamat lengkap" required></textarea>
                    </div>
                    <div class="form-group-full">
                        <label>Foto Guru</label>
                        <input type="file" id="input-foto" name="foto" accept="image/*">
                        <img id="foto-preview" src="" alt="Preview Foto">
                    </div>
                </div>
                <button type="submit" class="btn-add" style="width: 100%; margin-top: 20px; justify-content: center;">Simpan Data</button>
            </form>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let mouse = { x: null, y: null };
        function initCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('mousemove', (e) => { mouse.x = e.x; mouse.y = e.y; });
        window.addEventListener('mouseout', () => { mouse.x = null; mouse.y = null; });
        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 1; this.speedX = Math.random() * 0.6 - 0.3; this.speedY = Math.random() * 0.6 - 0.3;
            }
            update() {
                this.x += this.speedX; this.y += this.speedY;
                if (this.x > canvas.width) this.x = 0; if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0; if (this.y < 0) this.y = canvas.height;
            }
            draw(color) { ctx.fillStyle = color; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); }
        }
        function createParticles() { particles = []; for (let i = 0; i < 50; i++) particles.push(new Particle()); }
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const isDark = document.body.classList.contains('dark');
            const color = isDark ? 'rgba(255, 255, 255, 0.1)' : 'rgba(79, 70, 229, 0.1)';
            particles.forEach((p, index) => {
                p.update(); p.draw(color);
                for (let j = index; j < particles.length; j++) {
                    const dx = p.x - particles[j].x; const dy = p.y - particles[j].y;
                    if (Math.sqrt(dx * dx + dy * dy) < 200) { ctx.strokeStyle = color; ctx.lineWidth = 0.5; ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(particles[j].x, particles[j].y); ctx.stroke(); }
                }
                if (mouse.x != null && mouse.y != null) {
                    const dx = p.x - mouse.x; const dy = p.y - mouse.y;
                    if (Math.sqrt(dx * dx + dy * dy) < 180) { ctx.strokeStyle = color; ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(mouse.x, mouse.y); ctx.stroke(); }
                }
            });
            requestAnimationFrame(animate);
        }
        window.addEventListener('resize', initCanvas); initCanvas(); createParticles(); animate();

        // Supabase Configuration
        const SB_URL = "https://zmvnqixjxlyaigecgpgi.supabase.co/rest/v1/tb_guru";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inptdm5xaXhqeGx5YWlnZWNncGdpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyODA2MDIsImV4cCI6MjA5NDg1NjYwMn0.PW6qb8LXUDdu8E9P8WvGBPWZl4Z24jk-ue2XmZdorNo";
        const SB_STORAGE_URL = "https://zmvnqixjxlyaigecgpgi.supabase.co/storage/v1/object/assets";

        // Form Submission Logic
        const formGuru = document.getElementById('form-guru');
        formGuru.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const submitBtn = formGuru.querySelector('button[type="submit"]');
            const originalBtnText = submitBtn.innerText;
            
            try {
                submitBtn.disabled = true;
                submitBtn.innerText = "Menyimpan...";

                const formData = new FormData(formGuru);
                const data = Object.fromEntries(formData.entries());

                // Handle Photo upload to Storage Bucket if exists
                if (data.foto && data.foto.size > 0) {
                    const file = data.foto;
                    const fileName = `${Date.now()}_${file.name}`;
                    const uploadUrl = `${SB_STORAGE_URL}/${fileName}`;

                    const uploadResponse = await fetch(uploadUrl, {
                        method: 'POST',
                        headers: {
                            'apikey': SB_KEY,
                            'Authorization': `Bearer ${SB_KEY}`,
                            'Content-Type': file.type
                        },
                        body: file
                    });

                    if (!uploadResponse.ok) {
                        const uploadErr = await uploadResponse.json();
                        throw new Error(uploadErr.message || 'Gagal mengunggah foto ke storage');
                    }

                    // Simpan Public URL ke database
                    data.foto = `https://zmvnqixjxlyaigecgpgi.supabase.co/storage/v1/object/public/assets/${fileName}`;
                } else {
                    delete data.foto;
                }

                const response = await fetch(SB_URL, {
                    method: 'POST',
                    headers: {
                        'apikey': SB_KEY,
                        'Authorization': `Bearer ${SB_KEY}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=minimal'
                    },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    alert('Data Guru berhasil disimpan ke Supabase!');
                    modal.style.display = 'none';
                    formGuru.reset();
                    document.getElementById('foto-preview').style.display = 'none';
                    // Anda bisa menambahkan fungsi refresh tabel di sini jika diperlukan
                    location.reload(); 
                } else {
                    const err = await response.json();
                    throw new Error(err.message || 'Gagal menyimpan data');
                }

            } catch (error) {
                console.error("Error:", error);
                alert('Terjadi kesalahan: ' + error.message);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = originalBtnText;
            }
        });

        // Modal Logic
        const modal = document.getElementById('modal-guru');
        const btnTambah = document.getElementById('btn-tambah-guru');
        const btnClose = document.getElementById('close-modal-btn');
        const idGuruInput = document.getElementById('id_guru');

        // Function to generate Auto ID
        function generateAutoID() {
            const now = new Date();
            const dd = String(now.getDate()).padStart(2, '0');
            const mm = String(now.getMonth() + 1).padStart(2, '0');
            const yy = String(now.getFullYear()).slice(-2);
            
            // 4 digit random number
            const randomDigits = Math.floor(1000 + Math.random() * 9000);
            
            const generatedID = `IDG.${dd}${mm}${yy}-${randomDigits}`;
            idGuruInput.value = generatedID;
        }

        btnTambah.addEventListener('click', () => {
            generateAutoID(); // Generate ID when modal opens
            modal.style.display = 'flex';
        });

        btnClose.addEventListener('click', () => {
            modal.style.display = 'none';
            document.getElementById('form-guru').reset();
            const previewFoto = document.getElementById('foto-preview');
            previewFoto.style.display = 'none';
            previewFoto.src = "";
        });

        window.addEventListener('click', (e) => {
            if (e.target === modal) {
                modal.style.display = 'none';
            }
        });

        // Photo Preview Logic
        const inputFoto = document.getElementById('input-foto');
        const previewFoto = document.getElementById('foto-preview');

        inputFoto.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    previewFoto.src = e.target.result;
                    previewFoto.style.display = 'block';
                }
                reader.readAsDataURL(file);
            } else {
                previewFoto.src = "";
                previewFoto.style.display = 'none';
            }
        });

        const themeToggle = document.getElementById('theme-toggle');
        if (localStorage.getItem('theme') === 'dark') { document.body.classList.add('dark'); themeToggle.innerText = '☀️'; }
        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark');
            const isDark = document.body.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            themeToggle.innerText = isDark ? '☀️' : '🌙';
        });
        const urlParams = new URLSearchParams(window.location.search);
        const role = urlParams.get('role') || 'User';
        document.getElementById('link-dashboard').href = `dashboard.html?role=${role}`;
        document.getElementById('link-guru').href = `data_guru.html?role=${role}`;
        document.getElementById('sidebar-toggle').addEventListener('click', () => {
            const wrapper = document.querySelector('.wrapper');
            if (window.innerWidth <= 768) wrapper.classList.toggle('sidebar-open');
            else wrapper.classList.toggle('collapsed');
        });
    </script>
</body>
</html>
