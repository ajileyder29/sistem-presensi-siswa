    <style>
        :root {
            --primary-color: #4f46e5;
            --bg-color: #f3f4f6;
            --card-bg: rgba(255, 255, 255, 0.6);
            --modal-bg: #ffffff;
            --text-color: #1f2937;
            --text-muted: #6b7280;
            --nav-bg: rgba(255, 255, 255, 0.7);
            --nav-border: rgba(0,0,0,0.1);
            --table-border: #e5e7eb;
            --glass-blur: blur(10px);
        }

        body.dark {
            --bg-color: #111827;
            --card-bg: rgba(15, 23, 42, 0.4);
            --modal-bg: #1f2937;
            --text-color: #f3f4f6;
            --text-muted: #9ca3af;
            --nav-bg: rgba(15, 23, 42, 0.6);
            --nav-border: rgba(255,255,255,0.1);
            --table-border: #374151;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); overflow-x: hidden; }
        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
        
        nav {

        .nav-logo { height: 32px; width: auto; }
        .nav-logo-link { display: flex; flex-direction: column; align-items: center; text-decoration: none; line-height: 1.2; }
        .nav-system-title { font-size: 0.9rem; font-weight: 700; color: var(--primary-color); letter-spacing: 1px; margin-top: 4px; }
        .nav-system-subtitle {
            font-size: 0.55rem;
            color: var(--text-muted);
            font-weight: 400;
        }

        .wrapper { display: flex; flex-direction: column; min-height: calc(100vh - 73px); }

            width: 100%;
            background-color: var(--nav-bg);
            border-bottom: 1px solid var(--nav-border);

        .nav-sidebar { list-style: none; display: flex; justify-content: center; flex-wrap: nowrap; gap: 5px; padding: 0 20px; }
        .nav-item a { padding: 12px 18px; display: flex; flex-direction: column; align-items: center; gap: 6px; color: var(--text-color); text-decoration: none; font-size: 0.75rem; font-weight: 500; border-radius: 12px; transition: all 0.3s ease; white-space: nowrap; }

        .nav-item a:hover, .nav-item.active a { background: rgba(79, 70, 229, 0.1); transform: translateY(-2px); }
        .nav-item a:hover i { transform: scale(1.1); }

        .content { flex: 1; padding: 30px; }

        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }

        .btn-add {

        .btn-add:active { transform: scale(0.95); }

        /* Modern Table Styles (not directly used here, but for consistency) */
        .table-container {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            margin-top: 15px;
            border-radius: 12px;
            border: 1px solid var(--table-border);

        table { width: 100%; border-collapse: collapse; background: transparent; }

        .theme-switch {
            display: inline-block;
            height: 24px;

            width: 46px;

        .theme-switch input { display: none; }

        .slider-toggle {
            background-color: var(--selector-bg, rgba(0,0,0,0.05));
            border: 1px solid var(--nav-border);
            bottom: 0;
            cursor: pointer;
            left: 0;
            position: absolute;
            right: 0;
            top: 0;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            border-radius: 34px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 6px;
            backdrop-filter: blur(5px);
        }

        .slider-toggle:before {
            background-color: var(--white, #fff);
            bottom: 3px;
            content: "";
            height: 16px;
            left: 3px;
            position: absolute;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            width: 16px;
            border-radius: 50%;
            z-index: 2;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);

            background-color: var(--primary-color);

        /* Password Toggle */

        #modal-photo-display {

            .nav-item a { padding: 8px 12px; font-size: 0.65rem; min-width: 70px; }
            .nav-item i { font-size: 1.2rem; }
        }
    </style>
</head>

    <script>
        // Canvas Animation Logic (reused)
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let mouse = { x: null, y: null };
        
        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.x;
            mouse.y = e.y;
        });

        window.addEventListener('mouseout', () => {
            mouse.x = null;
            mouse.y = null;
        });

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 1;
                this.speedX = Math.random() * 0.6 - 0.3;
                this.speedY = Math.random() * 0.6 - 0.3;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x > canvas.width) this.x = 0;
                if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                if (this.y < 0) this.y = canvas.height;
            }
            draw(color) {
                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); 
                ctx.fill();
            }
        }

        function createParticles() {
            particles = [];
            for (let i = 0; i < 50; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const isDark = document.body.classList.contains('dark');
            const color = isDark ? 'rgba(255, 255, 255, 0.1)' : 'rgba(79, 70, 229, 0.1)';
            
            particles.forEach((p, index) => {
                p.update();
                p.draw(color);
                
                for (let j = index; j < particles.length; j++) {
                    const dx = p.x - particles[j].x;
                    const dy = p.y - particles[j].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    
                    if (distance < 200) {
                        ctx.strokeStyle = color;
                        ctx.lineWidth = 0.5;
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }

                if (mouse.x != null && mouse.y != null) {
                    const dx = p.x - mouse.x;
                    const dy = p.y - mouse.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    if (distance < 180) {
                        ctx.strokeStyle = color;
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(mouse.x, mouse.y);
                        ctx.stroke();
                    }
                }
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', initCanvas);
        initCanvas();
        createParticles();
        animate();

        // Supabase Config (using tb_guru for user data)
        const SB_URL_GURU = "https://zmvnqixjxlyaigecgpgi.supabase.co/rest/v1/tb_guru";
        const SB_STORAGE = "https://zmvnqixjxlyaigecgpgi.supabase.co/storage/v1/object/assets";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inptdm5xaXhqeGx5YWlnZWNncGdpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyODA2MDIsImV4cCI6MjA5NDg1NjYwMn0.PW6qb8LXUDdu8E9P8WvGBPWZl4Z24jk-ue2XmZdorNo";

        let currentPhotoUrl = ""; // To track current photo for replacement logic

        // Global Notification Function (reused)
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const icon = type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle';
            toast.innerHTML = `<i class="fas ${icon}"></i> <span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // Photo Preview Logic (reused)
        const photoPreviewModal = document.getElementById('photo-preview-modal');
        const modalPhotoDisplay = document.getElementById('modal-photo-display');
        const closePhotoPreviewBtn = document.getElementById('close-photo-preview-btn');

        function showPhotoPreview(imageUrl) {
            modalPhotoDisplay.src = imageUrl;
            photoPreviewModal.style.display = 'flex';
            setTimeout(() => photoPreviewModal.classList.add('active'), 10);
        }

        function closePhotoPreview() {
            photoPreviewModal.classList.remove('active');
            setTimeout(() => {
                photoPreviewModal.style.display = 'none';
                modalPhotoDisplay.src = '';
            }, 400);
        }

        closePhotoPreviewBtn.onclick = closePhotoPreview;
        photoPreviewModal.onclick = (e) => { 
            if (e.target === photoPreviewModal) closePhotoPreview(); 
        };

        // --- Authentication Check ---
        function checkAuth() {
            if (sessionStorage.getItem('isLoggedIn') !== 'true') {
                window.location.href = 'index.html';
            }
        }
        checkAuth();

        // --- Fetch User Data for Settings ---
        async function fetchUserData() {
            const username = sessionStorage.getItem('username');
            if (!username) {
                showToast("Username tidak ditemukan di sesi. Silakan login ulang.", "error");
                setTimeout(() => window.location.href = 'index.html', 1500);
                return;
            }

            try {
                const res = await fetch(`${SB_URL_GURU}?username_guru=eq.${username}&select=*`, {
                    method: 'GET',
                    headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` }
                });
                if (!res.ok) {
                    const errorData = await res.json();
                    throw new Error(errorData.message || "Gagal mengambil data pengguna.");
                }
                const userData = await res.json();
                if (userData.length === 0) {
                    throw new Error("Data pengguna tidak ditemukan.");
                }

                const user = userData[0];
                document.getElementById('id_guru').value = user.id_guru;
                document.getElementById('nama_guru').value = user.nama_guru || '';
                document.getElementById('nip_guru').value = user.nip_guru || '';
                document.getElementById('alamat_guru').value = user.alamat_guru || '';
                document.getElementById('no_hp_guru').value = user.no_hp_guru || '';
                document.getElementById('username_guru').value = user.username_guru || '';
                document.getElementById('role').value = user.role || '';
                
                currentPhotoUrl = user.foto || '';
                if (currentPhotoUrl) {
                    document.getElementById('profile-photo-preview').src = currentPhotoUrl;
                } else {
                    document.getElementById('profile-photo-preview').src = "https://via.placeholder.com/150?text=No+Photo";
                }

            } catch (err) {
                showToast(err.message, "error");
            }
        }

        // --- Handle Profile Photo Change ---
        const profilePhotoPreview = document.getElementById('profile-photo-preview');
        const inputProfileFoto = document.getElementById('input-profile-foto');
        const btnChangePhoto = document.getElementById('btn-change-photo');

        btnChangePhoto.onclick = () => inputProfileFoto.click();

        inputProfileFoto.onchange = function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = e => { profilePhotoPreview.src = e.target.result; };
                reader.readAsDataURL(file);
            }
        };

        profilePhotoPreview.onclick = () => {
            if (profilePhotoPreview.src && !profilePhotoPreview.src.includes('placeholder')) {
                showPhotoPreview(profilePhotoPreview.src);
            }
        };

        // --- Handle Form Submission (Update Profile & Password) ---
        document.getElementById('form-pengaturan').onsubmit = async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Menyimpan...';

            const id_guru = document.getElementById('id_guru').value;
            const nama_guru = document.getElementById('nama_guru').value;
            const nip_guru = document.getElementById('nip_guru').value;
            const alamat_guru = document.getElementById('alamat_guru').value;
            const no_hp_guru = document.getElementById('no_hp_guru').value;
            const new_pass = document.getElementById('new_pass').value;
            const confirm_new_pass = document.getElementById('confirm_new_pass').value;
            const inputFotoFile = document.getElementById('input-profile-foto').files[0];

            let updateData = {
                nama_guru: nama_guru,
                nip_guru: nip_guru,
                alamat_guru: alamat_guru,
                no_hp_guru: no_hp_guru
            };

            try {
                // Handle Photo Upload/Replacement
                if (inputFotoFile) {
                    // Delete old photo if exists
                    if (currentPhotoUrl) {
                        const oldFileName = currentPhotoUrl.split('/').pop();
                        await fetch(`${SB_STORAGE}/${oldFileName}`, {
                            method: 'DELETE',
                            headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` }
                        });
                    }

                    const fileName = `${Date.now()}_${inputFotoFile.name}`;
                    const uploadRes = await fetch(`${SB_STORAGE}/${fileName}`, {
                        method: 'POST',
                        headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Content-Type': inputFotoFile.type },
                        body: inputFotoFile
                    });
                    if (!uploadRes.ok) throw new Error("Gagal mengunggah foto.");
                    updateData.foto = `https://zmvnqixjxlyaigecgpgi.supabase.co/storage/v1/object/public/assets/${fileName}`;
                } else {
                    // If no new photo, retain current one
                    updateData.foto = currentPhotoUrl;
                }

                // Handle Password Change
                if (new_pass) {
                    if (new_pass !== confirm_new_pass) {
                        throw new Error("Kata sandi baru dan konfirmasi tidak cocok.");
                    }
                    // IMPORTANT: In a real app, hash the password on the backend (e.g., using Supabase Edge Functions or a custom API)
                    // For this frontend-only example, we'll directly update the plain text password.
                    // This is NOT secure for production.
                    updateData.pass_guru = new_pass; 
                    showToast("Peringatan: Password disimpan tanpa hashing. Ini tidak aman untuk produksi.", "error");
                }

                // Update user data in Supabase
                const res = await fetch(`${SB_URL_GURU}?id_guru=eq.${id_guru}`, {
                    method: 'PATCH',
                    headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify(updateData)
                });

                if (!res.ok) {
                    const errorData = await res.json();
                    throw new Error(errorData.message || "Gagal menyimpan perubahan.");
                }

                showToast("Profil berhasil diperbarui!");
                // Re-fetch data to ensure UI is updated with latest info (e.g., new photo URL)
                fetchUserData();
                // Clear password fields after successful update
                document.getElementById('new_pass').value = '';
                document.getElementById('confirm_new_pass').value = '';

            } catch (err) {
                showToast(err.message, "error");
            } finally {
                btn.disabled = false;
                btn.innerText = "Simpan Perubahan";
            }
        };

        // --- Password Toggle Logic ---
        function setupPasswordToggle(toggleId, inputId) {
            const toggleBtn = document.getElementById(toggleId);
            const inputField = document.getElementById(inputId);
            if (toggleBtn && inputField) {
                toggleBtn.onclick = function() {
                    const type = inputField.getAttribute('type') === 'password' ? 'text' : 'password';
                    inputField.setAttribute('type', type);
                    this.classList.toggle('fa-eye');
                    this.classList.toggle('fa-eye-slash');
                };
            }
        }
        setupPasswordToggle('toggleNewPass', 'new_pass');
        setupPasswordToggle('toggleConfirmNewPass', 'confirm_new_pass');


        // --- Theme Toggle Logic (reused) ---
        const themeCheckbox = document.getElementById('theme-checkbox');
        const body = document.body;

        if (localStorage.getItem('theme') === 'dark') {
            body.classList.add('dark');
            themeCheckbox.checked = true;
        }

        themeCheckbox.addEventListener('change', () => {
            const isDark = themeCheckbox.checked;
            body.classList.toggle('dark', isDark);
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        });

        // --- Navigation Links Update (reused) ---
        const urlParams = new URLSearchParams(window.location.search);
        const role = sessionStorage.getItem('role') || 'User'; // Get role from session
        document.getElementById('link-dashboard').href = `dashboard.html?role=${role}`;
        document.getElementById('link-siswa').href = `data_siswa.html?role=${role}`;
        document.getElementById('link-guru').href = `data_guru.html?role=${role}`;
        document.getElementById('link-absensi').href = `absensi.html?role=${role}`;
        document.getElementById('link-mapel').href = `data_mapel.html?role=${role}`;
        document.getElementById('link-kelas').href = `data_kelas.html?role=${role}`;
        document.getElementById('link-jurusan').href = `data_jurusan.html?role=${role}`;
        document.getElementById('link-laporan').href = `#?role=${role}`; // Placeholder
        document.getElementById('link-pengaturan').href = `pengaturan.html?role=${role}`;

        // --- Logout Button (reused) ---
        const btnLogout = document.querySelector('.btn-logout');
        if (btnLogout) {
            btnLogout.onclick = (e) => {
                e.preventDefault();
                sessionStorage.clear();
                window.location.href = 'index.html';
            };
        }

        // Initial data fetch
        fetchUserData();
    </script>
</body>
</html>
