<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Sistem Informasi Sekolah</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Tambahkan FontAwesome untuk Ikon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #4f46e5;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-color: #1f2937;
            --text-muted: #6b7280;
            --nav-bg: #ffffff;
            --nav-border: rgba(0,0,0,0.1);
        }

        body.dark {
            --bg-color: #111827;
            --card-bg: #1f2937;
            --text-color: #f3f4f6;
            --text-muted: #9ca3af;
            --nav-bg: #1f2937;
            --nav-border: rgba(255,255,255,0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
        }

        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        nav {
            background-color: var(--nav-bg);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--nav-border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-weight: 600;
            font-size: 1.2rem;
            color: var(--primary-color);
        }

        /* AdminLTE Layout Structure */
        .wrapper {
            display: flex;
            min-height: calc(100vh - 73px);
        }

        .main-sidebar {
            width: 250px;
            background-color: var(--nav-bg);
            border-right: 1px solid var(--nav-border);
            padding: 15px 0;
            z-index: 10;
            transition: all 0.3s ease;
            overflow-x: hidden;
            white-space: nowrap;
        }

        .wrapper.collapsed .main-sidebar {
            width: 0;
            border-right: none;
        }

        .nav-sidebar {
            list-style: none;
        }

        .nav-item a {
            padding: 12px 25px;
            display: flex;
            align-items: center;
            color: var(--text-color);
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .nav-item i {
            width: 30px;
            font-size: 1.1rem;
            color: var(--primary-color);
        }

        .nav-item a:hover, .nav-item.active a {
            background: rgba(79, 70, 229, 0.1);
            border-left: 4px solid var(--primary-color);
            padding-left: 21px;
        }

        .btn-logout {
            padding: 8px 16px;
            background-color: #ef4444;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-size: 0.9rem;
            transition: opacity 0.3s;
        }

        .btn-logout:hover {
            opacity: 0.8;
        }

        .sidebar-toggle-btn {
            background: none;
            border: none;
            color: var(--text-color);
            font-size: 1.2rem;
            cursor: pointer;
            margin-right: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.3s;
        }

        .sidebar-toggle-btn:hover {
            color: var(--primary-color);
        }

        .content {
            flex: 1;
            padding: 30px;
            background-color: transparent;
        }

        /* AdminLTE Widgets */
        .row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-top: 25px;
        }

        .info-box {
            background: var(--card-bg);
            display: flex;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            align-items: center;
        }

        .info-box-icon {
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: white;
        }

        .info-box-content {
            padding: 15px;
        }

        .info-box-text { font-size: 0.85rem; color: var(--text-muted); }
        .info-box-number { font-size: 1.2rem; font-weight: 600; display: block; }

        .bg-info { background: #3b82f6; }
        .bg-success { background: #10b981; }
        .bg-warning { background: #f59e0b; }
        .bg-danger { background: #ef4444; }

        .welcome-card {
            position: relative;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        h1 { margin-bottom: 10px; }
        p { color: var(--text-muted); }

        .theme-toggle-nav {
            background: none;
            border: 1px solid var(--nav-border);
            padding: 5px 10px;
            border-radius: 6px;
            cursor: pointer;
            color: var(--text-color);
            margin-right: 15px;
        }

        @media (max-width: 768px) {
            .main-sidebar {
                width: 0;
                border-right: none;
            }
            .wrapper.sidebar-open .main-sidebar {
                width: 250px;
                border-right: 1px solid var(--nav-border);
            }
        }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>

    <nav>
        <div style="display: flex; align-items: center;">
            <button id="sidebar-toggle" class="sidebar-toggle-btn">
                <i class="fas fa-bars"></i>
            </button>
            <div class="logo">SekolahKu</div>
        </div>
        <div style="display: flex; align-items: center;">
            <button class="theme-toggle-nav" id="theme-toggle">🌙</button>
            <a href="index.html" class="btn-logout">Keluar</a>
        </div>
    </nav>

    <div class="wrapper">
        <aside class="main-sidebar">
            <ul class="nav-sidebar">
                <li class="nav-item active"><a href="dashboard.html" id="link-dashboard"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                <li class="nav-item"><a href="#"><i class="fas fa-user-graduate"></i> Data Siswa</a></li>
                <li class="nav-item"><a href="data_guru.html" id="link-guru"><i class="fas fa-chalkboard-teacher"></i> Data Guru</a></li>
                <li class="nav-item"><a href="#"><i class="fas fa-calendar-check"></i> Absensi</a></li>
                <li class="nav-item"><a href="#"><i class="fas fa-file-invoice"></i> Laporan</a></li>
                <li class="nav-item"><a href="#"><i class="fas fa-cog"></i> Pengaturan</a></li>
            </ul>
        </aside>

        <main class="content">
            <div class="welcome-card">
                <h1>Selamat Datang, <span id="display-role">User</span>!</h1>
                <p>Anda masuk sebagai <strong id="role-text">Administrator</strong>. Kelola data sekolah Anda dengan mudah di sini.</p>
            </div>

            <!-- AdminLTE Style Info Boxes (Hanya terlihat jika Admin) -->
            <div class="row" id="admin-widgets" style="display: none;">
                <div class="info-box">
                    <span class="info-box-icon bg-info"><i class="fas fa-users"></i></span>
                    <div class="info-box-content">
                        <span class="info-box-text">Total Siswa</span>
                        <span class="info-box-number">1,240</span>
                    </div>
                </div>
                <div class="info-box">
                    <span class="info-box-icon bg-success"><i class="fas fa-user-tie"></i></span>
                    <div class="info-box-content">
                        <span class="info-box-text">Total Guru</span>
                        <span class="info-box-number">86</span>
                    </div>
                </div>
                <div class="info-box">
                    <span class="info-box-icon bg-warning"><i class="fas fa-clock"></i></span>
                    <div class="info-box-content">
                        <span class="info-box-text">Absensi Hari Ini</span>
                        <span class="info-box-number">94%</span>
                    </div>
                </div>
                <div class="info-box">
                    <span class="info-box-icon bg-danger"><i class="fas fa-exclamation-triangle"></i></span>
                    <div class="info-box-content">
                        <span class="info-box-text">Peringatan</span>
                        <span class="info-box-number">2</span>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Canvas Animation Logic
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let mouse = { x: null, y: null };
        
        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.x;
            mouse.y = e.y;
        });

        window.addEventListener('mouseout', () => {
            mouse.x = null;
            mouse.y = null;
        });

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 1;
                this.speedX = Math.random() * 0.6 - 0.3;
                this.speedY = Math.random() * 0.6 - 0.3;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x > canvas.width) this.x = 0;
                if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                if (this.y < 0) this.y = canvas.height;
            }
            draw(color) {
                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function createParticles() {
            particles = [];
            for (let i = 0; i < 50; i++) { // Lebih sedikit partikel di dashboard agar bersih
                particles.push(new Particle());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const isDark = document.body.classList.contains('dark');
            const color = isDark ? 'rgba(255, 255, 255, 0.1)' : 'rgba(79, 70, 229, 0.1)';
            
            particles.forEach((p, index) => {
                p.update();
                p.draw(color);
                
                for (let j = index; j < particles.length; j++) {
                    const dx = p.x - particles[j].x;
                    const dy = p.y - particles[j].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    
                    if (distance < 200) {
                        ctx.strokeStyle = color;
                        ctx.lineWidth = 0.5;
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }

                // Interaksi dengan Mouse
                if (mouse.x != null && mouse.y != null) {
                    const dx = p.x - mouse.x;
                    const dy = p.y - mouse.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    if (distance < 180) {
                        ctx.strokeStyle = color;
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(mouse.x, mouse.y);
                        ctx.stroke();
                    }
                }
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', initCanvas);
        initCanvas();
        createParticles();
        animate();

        // Theme Logic
        const themeToggle = document.getElementById('theme-toggle');
        const body = document.body;

        if (localStorage.getItem('theme') === 'dark') {
            body.classList.add('dark');
            themeToggle.innerText = '☀️';
        }

        themeToggle.addEventListener('click', () => {
            body.classList.toggle('dark');
            if (body.classList.contains('dark')) {
                localStorage.setItem('theme', 'dark');
                themeToggle.innerText = '☀️';
            } else {
                localStorage.setItem('theme', 'light');
                themeToggle.innerText = '🌙';
            }
        });

        const urlParams = new URLSearchParams(window.location.search);
        const role = urlParams.get('role') || 'User';
        document.getElementById('display-role').innerText = role;
        document.getElementById('role-text').innerText = role;

        // Update links to preserve role
        document.getElementById('link-dashboard').href = `dashboard.html?role=${role}`;
        document.getElementById('link-guru').href = `data_guru.html?role=${role}`;

        // Tampilkan widget AdminLTE jika role adalah Admin
        if (role === 'Admin') {
            document.getElementById('admin-widgets').style.display = 'grid';
        }

        // Sidebar Toggle Logic
        const sidebarToggle = document.getElementById('sidebar-toggle');
        const wrapper = document.querySelector('.wrapper');

        sidebarToggle.addEventListener('click', () => {
            if (window.innerWidth <= 768) {
                wrapper.classList.toggle('sidebar-open');
            } else {
                wrapper.classList.toggle('collapsed');
            }
        });
    </script>
</body>
</html>
